services:
  database:
    image: postgres:16-alpine
    container_name: chromag-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chromag}
      POSTGRES_USER: ${POSTGRES_USER:-chromag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chromag}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chromag} -d ${POSTGRES_DB:-chromag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chromag-api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-chromag}:${POSTGRES_PASSWORD:-chromag}@database:5432/${POSTGRES_DB:-chromag}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-development-secret}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm run db:seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chromag-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://localhost:${BACKEND_PORT:-4000}/api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data: